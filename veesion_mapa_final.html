<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#f1f5f9;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:#fff;border-bottom:2px solid #e2e8f0;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 1px 8px rgba(0,0,0,.07)}
.hlogo{display:flex;align-items:center;gap:10px}
.hbadge{width:36px;height:36px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:17px}
.htitle h1{font-size:17px;font-weight:900;color:#1e293b}
.htitle p{font-size:10px;color:#94a3b8;font-weight:700}
.hkpis{display:flex;gap:8px}
.hk{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:6px 14px;text-align:center}
.hk .v{font-size:18px;font-weight:900;color:#1e293b}
.hk .l{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8}
.hk.g .v{color:#16a34a}.hk.r .v{color:#dc2626}.hk.b .v{color:#2563eb}
.dlbtn{background:#6366f1;color:#fff;border:none;padding:9px 18px;border-radius:9px;font-weight:900;font-size:12px;cursor:pointer;font-family:'Nunito',sans-serif}
.dlbtn:hover{background:#4f46e5}

.body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sb{width:280px;background:#fff;border-right:2px solid #e2e8f0;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sbh{padding:12px 14px 8px;border-bottom:1.5px solid #e2e8f0}
.sbh h3{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:#64748b;margin-bottom:8px}
.sbh input{width:100%;padding:7px 11px;border:1.5px solid #e2e8f0;border-radius:9px;font-family:'Nunito',sans-serif;font-size:12px;outline:none;color:#1e293b;background:#f8fafc}
.sbh input:focus{border-color:#6366f1}
.fbrow{display:flex;flex-wrap:wrap;gap:4px;padding:8px 12px;border-bottom:1.5px solid #e2e8f0}
.fb{font-size:10px;padding:4px 10px;border-radius:20px;border:1.5px solid #e2e8f0;background:#f8fafc;font-weight:800;cursor:pointer;color:#64748b}
.fb.on{color:#fff!important;border-color:transparent}
.fb.on.all{background:#6366f1}.fb.on.h{background:#16a34a}.fb.on.m{background:#d97706}.fb.on.a{background:#ea580c}.fb.on.c{background:#dc2626}

.frlist{overflow-y:auto;flex:1;padding:6px}
.frlist::-webkit-scrollbar{width:3px}.frlist::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:3px}
.fri{border:1.5px solid #e2e8f0;border-radius:10px;margin-bottom:6px;overflow:hidden}
.fri-head{display:flex;align-items:center;gap:10px;padding:8px 10px;cursor:pointer;background:#fff}
.fri-head:hover{background:#f8fafc}
.fri-head.open{background:#eef2ff;border-bottom:1.5px solid #e2e8f0}
.fri-logo{width:34px;height:34px;border-radius:7px;border:1px solid #e2e8f0;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.fri-logo img{width:32px;height:32px;object-fit:contain}
.fri-info{flex:1;min-width:0}
.fri-name{font-size:12px;font-weight:900;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fri-sub{font-size:10px;color:#94a3b8;font-weight:700}
.fri-cnt{font-size:14px;font-weight:900;color:#6366f1;margin-right:4px}
.fri-arrow{font-size:12px;color:#94a3b8;transition:transform .2s}
.fri-head.open .fri-arrow{transform:rotate(180deg)}
.stores-list{display:none;background:#f8fafc}
.stores-list.open{display:block}
.store-row{padding:7px 12px 7px 18px;border-bottom:1px solid #e8edf2;cursor:pointer;font-size:11px}
.store-row:hover{background:#eef2ff}
.store-row:last-child{border-bottom:none}
.sr-name{font-weight:800;color:#1e293b;margin-bottom:2px}
.sr-meta{display:flex;gap:6px;align-items:center}
.sr-city{color:#64748b}
.sr-badge{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:800;color:#fff}

/* MAP */
.mapwrap{flex:1;position:relative}
#map{width:100%;height:100%}

/* POPUP */
.leaflet-popup-content-wrapper{border-radius:14px!important;font-family:'Nunito',sans-serif!important;padding:0!important;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.18)!important;border:none!important}
.leaflet-popup-content{margin:0!important;width:260px!important}
.leaflet-popup-tip-container{display:none!important}
.pp-head{padding:12px 14px 8px;color:#fff}
.pp-name{font-size:13px;font-weight:900;line-height:1.2;margin-bottom:2px}
.pp-city{font-size:10px;opacity:.85;font-weight:700}
.pp-logo{width:40px;height:40px;border-radius:8px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;float:right;margin:-4px 0 0 8px}
.pp-logo img{width:38px;height:38px;object-fit:contain}
.pp-body{padding:10px 14px;background:#fff;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.pp-stat{background:#f8fafc;border-radius:8px;padding:6px 8px}
.pp-stat .sv{font-size:13px;font-weight:900;color:#1e293b}
.pp-stat .sl{font-size:9px;color:#94a3b8;font-weight:800;text-transform:uppercase;letter-spacing:.3px}
.pp-bar{height:5px;background:#e2e8f0;margin:4px 14px 6px;border-radius:4px;overflow:hidden}
.pp-csm{font-size:10px;color:#64748b;padding:0 14px 8px;font-weight:700}
.pp-link{display:block;margin:0 14px 12px;background:#0070d2;color:#fff;border-radius:8px;padding:8px;font-size:12px;font-weight:900;text-align:center;text-decoration:none}
.pp-link:hover{background:#005bb5}

/* Legend */
.leg{position:absolute;bottom:20px;right:16px;background:rgba(255,255,255,.97);border:1.5px solid #e2e8f0;border-radius:12px;padding:10px 14px;z-index:800}
.leg-t{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;margin-bottom:7px}
.lr{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:800;color:#334155;margin-bottom:4px}
.ld{width:11px;height:11px;border-radius:50%;flex-shrink:0}
</style>
</head>

function getFr(n){
  const l=n.toLowerCase();
  if(l.includes('carrefour'))return'Carrefour';
  if(l.includes('charter'))return'Charter';
  if(l.includes('dia')||l.includes('día'))return'DIA';
  if(l.includes('coviran')||l.includes('covirán'))return'Covirán';
  if(l.includes('bip'))return'Bip Bip';
  if(l.includes('eroski'))return'Eroski';
  if(l.startsWith('suma')||l.includes('suma '))return'Suma';
  if(l.includes('masymas')||l.includes('minymas')||l.includes('mas y mas'))return'Masymas/Minymas';
  if(l.includes('mercamas'))return'Mercamas';
  if(l.includes('condis'))return'Condis';
  if(l.includes('bonàrea')||l.includes('bonarea'))return'bonÀrea';
  if(l.includes('spar'))return'Spar';
  if(l.includes('caprabo'))return'Caprabo';
  if(l.includes('alteza')||l.includes('trebol'))return'Alteza';
  return'Otros';
}

const FM={};let pi2=0;
D.forEach(d=>{const f=getFr(d.n);d.fr=f;if(!FM[f]){FM[f]={color:PAL[pi2%PAL.length],stores:[]};pi2++;}FM[f].stores.push(d);});

// Map init
const map=L.map('map',{center:[40.2,-3.5],zoom:6,zoomControl:true});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);

// KPIs
const totMRR=D.reduce((s,d)=>s+(d.mrr||0),0);
document.getElementById('kt').textContent=D.length;
document.getElementById('km').textContent='€'+Math.round(totMRR/1000)+'k';
document.getElementById('kh').textContent=D.filter(d=>d.cat==='Healthy').length;
document.getElementById('kc').textContent=D.filter(d=>d.cat==='Critical').length;

// Create markers with logo icons
function logoIcon(d){
  const col=COL[d.cat];
  const logo=LOGOS[d.fr];
  const star=d.hs>=100?'<div style="position:absolute;top:-8px;right:-8px;font-size:11px">⭐</div>':'';
  const inner=logo
    ?`<img src="${logo}" style="width:22px;height:22px;object-fit:contain;border-radius:4px" onerror="this.style.display='none';this.nextSibling.style.display='block'"/><span style="display:none;font-size:8px;font-weight:900;color:#fff">${d.fr.substring(0,3)}</span>`
    :`<span style="font-size:8px;font-weight:900;color:#fff">${d.fr.substring(0,3).toUpperCase()}</span>`;
  const html=`<div style="position:relative;width:32px;height:32px">
    <div style="width:32px;height:32px;border-radius:50%;background:${col};border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;overflow:hidden">${inner}</div>
    ${star}
  </div>`;
  return L.divIcon({html,className:'',iconSize:[32,32],iconAnchor:[16,16],popupAnchor:[0,-18]});
}

function popupHtml(d){
  const col=COL[d.cat];
  const logo=LOGOS[d.fr];
  const logoHtml=logo?`<div class="pp-logo"><img src="${logo}" onerror="this.style.display='none'"></div>`:'';
  return `<div class="pp-head" style="background:${col}">
    ${logoHtml}
    <div class="pp-name">${d.n}</div>
    <div class="pp-city">📍 ${d.c} · ${d.fr}</div>
  </div>
  <div class="pp-body">
    <div class="pp-stat"><div class="sv">${d.mrr?'€'+d.mrr:'—'}</div><div class="sl">MRR/mes</div></div>
    <div class="pp-stat"><div class="sv">${d.hs}/100</div><div class="sl">Health Score</div></div>
    <div class="pp-stat"><div class="sv">${d.cams??'—'}</div><div class="sl">Cámaras</div></div>
    <div class="pp-stat"><div class="sv">${d.th!=null?d.th:'—'}</div><div class="sl">Robos det.</div></div>
    <div class="pp-stat"><div class="sv">${d.cr!=null?d.cr.toFixed(1)+'%':'—'}</div><div class="sl">Click Rate</div></div>
    <div class="pp-stat"><div class="sv" style="font-size:10px">${d.s}</div><div class="sl">Contrato desde</div></div>
  </div>
  <div class="pp-bar"><div style="height:100%;width:${d.hs}%;background:${col};border-radius:4px"></div></div>
  <div class="pp-csm">👤 CSM: ${d.csm||'—'}</div>
  <a class="pp-link" href="https://veesion.lightning.force.com/lightning/r/Account/${d.id}/view" target="_blank">🔗 Ver en Salesforce</a>`;
}

let aF='all',aS='',sFr=null;
const MK={};
D.forEach(d=>{
  const m=L.marker([d.lat,d.lng],{icon:logoIcon(d)});
  m.bindPopup(popupHtml(d),{maxWidth:260,className:''});
  m.addTo(map);
  MK[d.id]={marker:m,data:d};
});

// Sidebar
function catBadge(cat){
  const colors={Healthy:'#16a34a',Monitor:'#d97706','At Risk':'#ea580c',Critical:'#dc2626'};
  return `<span class="sr-badge" style="background:${colors[cat]}">${cat}</span>`;
}

function buildSidebar(data){
  const g={};
  data.forEach(d=>{if(!g[d.fr])g[d.fr]=[];g[d.fr].push(d);});
  const sorted=Object.entries(g).sort((a,b)=>b[1].length-a[1].length);
  const el=document.getElementById('frlist');el.innerHTML='';
  sorted.forEach(([fn,stores])=>{
    const col=FM[fn]?.color||'#6366f1';
    const logo=LOGOS[fn];
    const h=stores.filter(s=>s.cat==='Healthy').length;
    const tot=stores.reduce((s,d)=>s+(d.mrr||0),0);
    const isOpen=sFr===fn;

    const wrap=document.createElement('div');wrap.className='fri';

    const head=document.createElement('div');
    head.className='fri-head'+(isOpen?' open':'');
    head.innerHTML=`
      <div class="fri-logo">${logo?`<img src="${logo}" alt="${fn}" onerror="this.parentNode.innerHTML='<span style=font-size:9px;font-weight:900;color:${col}>${fn.substring(0,3)}</span>'">`:`<span style="font-size:9px;font-weight:900;color:${col}">${fn.substring(0,3).toUpperCase()}</span>`}</div>
      <div class="fri-info">
        <div class="fri-name">${fn}</div>
        <div class="fri-sub">${stores.length} locales · ${h} Healthy · €${Math.round(tot)}/m</div>
      </div>
      <div class="fri-cnt">${stores.length}</div>
      <div class="fri-arrow">▼</div>`;

    const list=document.createElement('div');
    list.className='stores-list'+(isOpen?' open':'');

    stores.sort((a,b)=>b.hs-a.hs).forEach(d=>{
      const row=document.createElement('div');
      row.className='store-row';
      row.innerHTML=`<div class="sr-name">${d.hs>=100?'⭐ ':''}${d.n}</div>
        <div class="sr-meta"><span class="sr-city">${d.c}</span>${catBadge(d.cat)}<span style="color:#64748b;font-size:10px">HS:${d.hs}</span>${d.mrr?`<span style="color:#16a34a;font-size:10px;font-weight:900">€${d.mrr}</span>`:''}</div>`;
      row.onclick=(e)=>{e.stopPropagation();map.setView([d.lat,d.lng],15);MK[d.id].marker.openPopup();};
      list.appendChild(row);
    });

    head.onclick=()=>{
      sFr=sFr===fn?null:fn;
      head.classList.toggle('open');
      list.classList.toggle('open');
      if(sFr){
        const lls=stores.map(s=>[s.lat,s.lng]);
        if(lls.length>1)map.fitBounds(lls,{padding:[50,50]});
        else map.setView(lls[0],15);
      }
    };

    wrap.appendChild(head);wrap.appendChild(list);
    el.appendChild(wrap);
  });
}

function getVis(){
  return D.filter(d=>{
    const c=aF==='all'||d.cat===aF;
    const s=!aS||d.n.toLowerCase().includes(aS)||d.c.toLowerCase().includes(aS)||d.fr.toLowerCase().includes(aS);
    return c&&s;
  });
}

function refresh(){
  const vis=getVis();const visIds=new Set(vis.map(d=>d.id));
  Object.entries(MK).forEach(([id,{marker}])=>{
    if(visIds.has(id)&&!map.hasLayer(marker))marker.addTo(map);
    if(!visIds.has(id)&&map.hasLayer(marker))map.removeLayer(marker);
  });
  buildSidebar(vis);
}

function setF(btn,f){
  aF=f;sFr=null;
  document.querySelectorAll('.fb').forEach(b=>{b.className='fb';});
  btn.classList.add('fb','on',f==='all'?'all':f==='Healthy'?'h':f==='Monitor'?'m':f==='At Risk'?'a':'c');
  refresh();
}

function onSearch(v){aS=v.toLowerCase().trim();sFr=null;refresh();}

function downloadPage(){
  const a=document.createElement('a');
  const blob=new Blob([document.documentElement.outerHTML],{type:'text/html'});
  a.href=URL.createObjectURL(blob);
  a.download='veesion_espana_'+new Date().toISOString().slice(0,10)+'.html';
  a.click();
}

buildSidebar(D);
</script>
